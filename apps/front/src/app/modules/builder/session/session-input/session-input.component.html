<div *ngIf="!providerHasApiKey" class="mb-2 text-center text-base text-red-500"
  >This provider requires an API key (see Project Settings)</div
>

<div
  class="overflow-hidden rounded-3xl border-[1.5px]"
  [ngClass]="{
    'border-s300 focus-within:border-s500': !effectiveDisabled,
    'border-s200 bg-s100': effectiveDisabled
  }"
>
  <ng-scrollbar
    [orientation]="'vertical'"
    [visibility]="'hover'"
    [appearance]="'compact'"
    class="max-h-[300px] min-h-16"
  >
    <div class="flex w-full flex-row items-end pl-5 pr-2">
      <textarea
        class="text-s1 min-w-0 flex-1 resize-none bg-transparent py-4 text-lg leading-relaxed placeholder-gray-400 [field-sizing:content] focus:outline-none"
        placeholder="Ask anything..."
        [(ngModel)]="messageText"
        (keydown)="onKeyDown($event)"
        [disabled]="effectiveDisabled"
        rows="1"
      ></textarea>

      <button
        class="sticky bottom-2 mb-2 ml-3 flex h-11 w-11 flex-shrink-0 items-center justify-center rounded-full focus:outline-none"
        [ngClass]="{
          'bg-m600 cursor-pointer':
            (isWorking && !messageText.trim()) ||
            (messageText.trim() && !effectiveDisabled),
          'bg-s300 cursor-default':
            !(isWorking && !messageText.trim()) &&
            (!messageText.trim() || effectiveDisabled)
        }"
        (click)="isWorking && !messageText.trim() ? onStop() : onSend()"
        [disabled]="
          !(isWorking && !messageText.trim()) &&
          (!messageText.trim() || effectiveDisabled)
        "
      >
        <m-stop-icon
          *ngIf="isWorking && !messageText.trim()"
          class="text-white"
        ></m-stop-icon>
        <m-arrow-up-icon
          *ngIf="!(isWorking && !messageText.trim())"
          class="text-white"
        ></m-arrow-up-icon>
      </button>
    </div>
  </ng-scrollbar>
</div>

<div
  *ngIf="showSelects"
  class="mt-4 flex flex-row items-center justify-center space-x-3"
>
  <div
    *ngIf="sessionType !== sessionTypeEnum.Explorer"
    class="h-10 w-10 flex-shrink-0"
  >
    <m-auto-accept-toggle [sessionId]="sessionId"></m-auto-accept-toggle>
  </div>

  <ng-select
    *ngIf="sessionType !== sessionTypeEnum.Explorer"
    class="session-agents-select w-[140px] select-none text-base"
    [items]="agents"
    [clearable]="false"
    [searchable]="true"
    [searchFn]="agentsSearchFn"
    [(ngModel)]="agent"
    (ngModelChange)="onAgentSelect()"
    [disabled]="disabled"
    appendTo="body"
    placeholder="Agent"
  ></ng-select>

  <ng-select
    class="session-models-select w-[340px] select-none text-base"
    [items]="models"
    bindLabel="label"
    bindValue="value"
    [clearable]="false"
    [searchable]="true"
    [searchFn]="modelsSearchFn"
    [loading]="modelsLoading"
    [(ngModel)]="model"
    (ngModelChange)="onModelSelect()"
    (open)="openModelSelect()"
    [disabled]="disabled"
    appendTo="body"
    placeholder="Model"
  >
    <ng-template ng-label-tmp let-item="item">
      <div class="ml-1 flex items-center truncate">
        <m-provider-icon
          *ngIf="item.providerId"
          [providerId]="item.providerId"
          class="text-s500 mr-2 flex-shrink-0"
        ></m-provider-icon>
        <span>{{ item.modelId }}</span>
      </div>
    </ng-template>

    <ng-template ng-option-tmp let-item="item">
      <div class="ml-1 flex items-center truncate">
        <m-provider-icon
          *ngIf="item.providerId"
          [providerId]="item.providerId"
          class="text-s500 mr-2 flex-shrink-0"
        ></m-provider-icon>
        <span>{{ item.modelId }}</span>
      </div>
    </ng-template>
  </ng-select>

  <ng-select
    class="session-variants-select w-[140px] select-none text-base"
    [items]="variants"
    [clearable]="false"
    [searchable]="true"
    [searchFn]="variantsSearchFn"
    [(ngModel)]="variant"
    (ngModelChange)="onVariantSelect()"
    [disabled]="disabled"
    appendTo="body"
    placeholder="Thinking"
  ></ng-select>

  <div
    *ngIf="sessionType !== sessionTypeEnum.Explorer"
    class="h-10 w-10 flex-shrink-0"
  >
    <m-context-usage-circle></m-context-usage-circle>
  </div>
</div>
