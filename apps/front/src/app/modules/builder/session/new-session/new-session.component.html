<div class="flex h-full w-full flex-col items-center">
  <div class="mb-6 mt-12 flex flex-shrink-0 flex-row items-center gap-x-6">
    <div
      class="border-s200 bg-s100 flex w-[300px] select-none flex-row rounded-lg border p-0.5"
    >
      <button
        *ngFor="let st of sessionTypes"
        class="flex-1 appearance-none rounded-md border-none px-4 py-1.5 text-lg outline-none ring-0 focus:outline-none focus:ring-0 focus-visible:outline-none focus-visible:ring-0 active:outline-none active:ring-0 [&]:[-webkit-tap-highlight-color:transparent]"
        [ngClass]="{
          'text-m800 border-s200 border bg-white font-medium shadow-sm':
            sessionType === st,
          'text-s500': sessionType !== st
        }"
        (click)="sessionType = st; onSessionTypeChange()"
      >
        <span class="flex flex-col items-center">
          <span class="flex flex-row items-center gap-x-3">
            <span class="flex">
              <m-lamp-desk-icon
                *ngIf="st === sessionTypeEnum.Explorer"
              ></m-lamp-desk-icon>
              <m-graduation-cap-icon
                *ngIf="st === sessionTypeEnum.Editor"
              ></m-graduation-cap-icon>
            </span>
            <span>{{ st }}</span>
          </span>
          <span class="invisible h-0 font-medium" aria-hidden="true">{{
            st
          }}</span>
        </span>
      </button>
    </div>
    <div class="grid grid-cols-[auto_1fr] items-center gap-x-3">
      <div class="text-s400 text-right text-base">Base branch</div>
      <ng-select
        class="w-[240px] select-none text-base"
        [items]="branches"
        [clearable]="false"
        [searchable]="true"
        [searchFn]="branchesSearchFn"
        [(ngModel)]="initialBranch"
        [loading]="branchesLoading"
        placeholder="Initial Branch"
        bindLabel="extraName"
        bindValue="branchId"
      ></ng-select>
    </div>
  </div>

  <div class="h-[30%] flex-shrink-0"></div>
  <div class="flex w-full max-w-[860px] flex-col px-6">
    <div class="mb-10 flex items-center justify-center">
      <img class="w-40" src="assets/logo/mprove_logo_web-01-b-gray.svg" />
    </div>

    <m-session-input
      [(model)]="model"
      [(agent)]="agent"
      [(variant)]="variant"
      [sessionType]="sessionType"
      [disabled]="isSubmitting"
      [scrollableInput]="true"
      (send)="sendMessage($event)"
    ></m-session-input>
  </div>
</div>
<div *ngIf="navBranch$ | async"></div>
