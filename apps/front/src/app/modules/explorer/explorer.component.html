<div class="bg-m1 flex h-full cursor-default flex-col">
  <div class="mx-6 mb-6 mt-8 flex flex-1 flex-col">
    <div class="flex h-11 flex-shrink-0 flex-row items-center">
      <div
        data-cy="explorerTitle"
        class="text-s1 flex select-none items-center self-center text-2xl font-semibold"
      >
        {{ pageTitle }}
      </div>

      <div class="ml-7 flex cursor-pointer flex-row items-center">
        <button
          data-cy="explorerHistoryButton"
          type="button"
          class="text-s500 flex items-center justify-center text-lg focus:outline-none"
          (click)="toggleHistory()"
          >History</button
        >
      </div>

      <div class="ml-7 flex-shrink-0">
        <button
          data-cy="explorerNewChatButton"
          type="button"
          class="border-s400 text-s500 hover:bg-s100 flex select-none flex-row items-center rounded border p-4 py-2 focus:outline-none"
          (click)="newChat()"
        >
          <div>New Chat</div>
        </button>
      </div>
    </div>

    <div class="mt-6 flex h-2 flex-1 flex-row">
      <ng-container *ngIf="!isSessionRoute">
        <div class="bg-m0 flex h-full w-full flex-grow rounded shadow">
          <router-outlet></router-outlet>
        </div>
      </ng-container>

      <ng-container *ngIf="isSessionRoute">
        <div
          class="bg-m0 flex h-full w-1/4 flex-shrink-0 flex-col rounded shadow"
        >
          <div class="flex flex-1 overflow-hidden">
            <router-outlet></router-outlet>
          </div>
        </div>

        <div class="bg-m0 ml-6 flex flex-1 flex-col rounded shadow">
          <m-explorer-tabs class="flex-shrink-0"></m-explorer-tabs>
          <div
            class="text-s500 flex flex-1 select-none items-center justify-center"
          >
            No tab selected
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</div>

<m-explorer-history
  *ngIf="showHistory"
  (close)="showHistory = false"
></m-explorer-history>

<div *ngIf="nav$ | async"></div>
<div *ngIf="routerEvents$ | async"></div>
