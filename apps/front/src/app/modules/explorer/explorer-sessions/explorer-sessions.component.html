<div class="bg-m0 relative flex h-full w-full flex-col">
  <div class="flex h-11 flex-shrink-0 flex-row items-center px-4 pt-3">
    <button
      tp="Refresh sessions"
      type="button"
      class="hover:bg-m200 flex h-9 w-9 flex-shrink-0 items-center justify-center rounded focus:outline-none"
      (click)="loadSessions()"
    >
      <m-refresh-icon></m-refresh-icon>
    </button>

    <div class="relative ml-3 flex h-7 w-7 flex-shrink-0">
      <ngx-spinner
        *ngIf="isRefreshing"
        [name]="spinnerName"
        color="#0084d1"
        bdColor="#00000000"
        size="default"
        type="ball-clip-rotate"
        [fullScreen]="false"
        [disableAnimation]="true"
        [zIndex]="10"
      ></ngx-spinner>
    </div>
  </div>

  <div
    *ngIf="sessionsLoaded && sessions.length === 0"
    class="pointer-events-none absolute inset-0 flex select-none items-center justify-center text-lg"
  >
    Sessions are empty
  </div>

  <div
    *ngIf="sessions.length > 0"
    class="flex h-2 w-full flex-grow flex-col overflow-y-auto"
  >
    <ng-scrollbar
      [orientation]="'vertical'"
      [visibility]="'hover'"
      [appearance]="'compact'"
    >
      <div class="mt-2 h-full w-full pb-6">
        <div
          *ngFor="let session of sessions; trackBy: trackBySessionId"
          class="hover:bg-m50 group mx-4 flex h-11 cursor-pointer select-none flex-row items-center rounded px-3"
          (click)="openSession(session)"
        >
          <span
            class="min-w-0 flex-1 truncate text-[17px]"
            [ngClass]="{
              'text-m600 font-semibold':
                session.sessionId === currentSession?.sessionId,
              'text-s1': session.sessionId !== currentSession?.sessionId
            }"
            >{{ session.displayTitle }}</span
          >
          <span
            *ngIf="session.status !== 'Active'"
            class="text-s400 ml-3 flex-shrink-0 text-[16px]"
            >{{ session.status }}</span
          >
        </div>
      </div>
    </ng-scrollbar>
  </div>
</div>

<div *ngIf="sessions$ | async"></div>
<div *ngIf="session$ | async"></div>
